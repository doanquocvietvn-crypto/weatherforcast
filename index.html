<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="left-sidebar">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="citySearch" placeholder="Tìm kiếm thành phố...">
            </div>

            <div class="current-weather">
                <h1 id="cityName">Đà Nẵng</h1>
                <p class="chance-rain">Xác suất mưa: <span id="mainRainChance">0%</span></p>
                <div class="temp-block">
                    <h2 id="currentTemp">31°</h2>
                    <i class="fa-solid fa-sun weather-icon-main"></i>
                </div>
            </div>

            <div class="hourly-forecast widget">
                <div class="widget-header">
                    <h3>Dự báo hôm nay</h3>
                </div>
                <div class="hourly-list" id="hourlyContainer">
                    </div>
            </div>
        </aside>

        <main class="main-content">
            <nav class="top-navigation">
                <a href="#" class="active">Hôm nay</a>
                <a href="#">Ngày mai</a>
                <a href="#">7 ngày tới</a>
            </nav>

            <section class="air-conditions widget">
                <div class="widget-header">
                    <h3>Chỉ số không khí</h3>
                    <button class="btn-more">Xem thêm</button>
                </div>
                <div class="conditions-grid">
                    <div class="condition-item">
                        <div class="condition-label">
                            <i class="fa-solid fa-temperature-half"></i> Cảm giác thực
                        </div>
                        <h4 id="realFeel">30°</h4>
                    </div>
                    <div class="condition-item">
                        <div class="condition-label">
                            <i class="fa-solid fa-wind"></i> Tốc độ gió
                        </div>
                        <h4 id="windSpeed">0.2 km/h</h4>
                    </div>
                    <div class="condition-item">
                        <div class="condition-label">
                            <i class="fa-solid fa-droplet"></i> Xác suất mưa
                        </div>
                        <h4 id="rainChance">0%</h4>
                    </div>
                    <div class="condition-item">
                        <div class="condition-label">
                            <i class="fa-solid fa-sun"></i> Chỉ số UV
                        </div>
                        <h4 id="uvIndex">3</h4>
                    </div>
                </div>
            </section>

            <section class="weekly-forecast widget">
                <div class="widget-header">
                    <h3>Dự báo 7 ngày</h3>
                </div>
                <ul class="forecast-list" id="weeklyContainer">
                    </ul>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
