<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Dashboard PRO</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <!-- LEFT -->
    <div class="card main-card">
      <h2 id="city">Đà Nẵng</h2>
      <h1 id="temp">--°C</h1>
      <p id="desc">Loading...</p>

      <div class="mini-grid">
        <div>💧 <span id="humidity">--</span>%</div>
        <div>💨 <span id="wind">--</span> m/s</div>
        <div>🌡 Feels <span id="feels">--</span></div>
        <div>🌡 Pressure <span id="pressure">--</span></div>
      </div>
    </div>

    <!-- CENTER -->
    <div class="card">
      <h3>Forecast</h3>
      <canvas id="chart"></canvas>
    </div>

    <!-- RIGHT -->
    <div class="card">
      <h3>Sunrise & Sunset</h3>
      <p>🌅 <span id="sunrise"></span></p>
      <p>🌇 <span id="sunset"></span></p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
